- name: send to discord
  run: |
    type="${{ github.event_name }}"

    event='${{ toJSON(github.event) }}'

    payload=$(jq -n \
      --arg type "$type" \
      --argjson event "$event" \
      '
      {
        embeds: [
          {
            title: ("github event: " + $type),
            description: (
              "repo: " + ($event.repository.full_name // "unknown") + "\n" +
              "actor: " + ($event.sender.login // "unknown") + "\n" +
              "ref: " + ($event.ref // "n/a")
            ),
            color: 3447003
          }
        ]
      }
      ')

    curl -H "Content-Type: application/json" \
      -X POST \
      -d "$payload" \
      ${{ secrets.DISCORD_WEBHOOK }}