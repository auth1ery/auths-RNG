name: discord notify

on:
  push:
    branches: [ "**" ]

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: send push to discord
        uses: Ilshidur/action-discord@master
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          noembed: true
          content: |
            push: ${{ github.repository }}@${{ github.ref_name }}
            commit: ${{ github.sha }}
            author: ${{ github.actor }}
            message: ${{ github.event.head_commit.message }}