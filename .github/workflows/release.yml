name: Promote Nightly to Main on Tag

on:
  push:
    tags:
      - "*"

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout main
        run: |
          git checkout main

      - name: Merge nightly into main
        run: |
          git merge origin/nightly --no-ff -m "Auto-merge nightly on tag ${{ github.ref_name }}"

      - name: Push changes
        run: |
          git push origin main